name: Auto-deploy site

on:
  schedule:
    - cron: "5 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: scheduled-deploy
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync data + build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=odyssey-site --branch=main --commit-dirty=true

      - name: Summary
        if: always()
        run: |
          echo "## Deploy result" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
