name = "odyssey-site"
compatibility_date = "2026-05-19"
pages_build_output_dir = "dist"

# Public-form vars (read by functions/api/contact.ts and realtor-intro.ts).
# RESEND_API_KEY is stored as a secret in the Pages dashboard, NOT here.
#
# FORM_RECIPIENTS is the FALLBACK only — used when no rotation event matches
# today and we can't route to a specific on-duty rep. Fan-out to all reps so
# nothing falls through. office@ is intentionally NOT here (it's invoice-only,
# not monitored by sales).
[vars]
FORM_RECIPIENTS = "kaysha@buildodyssey.com,susan@buildodyssey.com,gary@buildodyssey.com"
FORM_FROM = "Odyssey Homes <noreply@buildodyssey.com>"

# Silent owner BCC on every form submission — Curtis + Derek see every
# lead route through the site so they can monitor sales activity without
# the rep knowing they're watching. Dedup'd against the primary recipient
# so no one gets the same email twice. Natasha was here for ops visibility
# but Curtis decided 2026-05-31 to keep this owner-only (she already has
# enough inbox volume).
FORM_BCC = "curtis@buildodyssey.com,derek@buildodyssey.com"

# Apps Script web app endpoint that returns today's on-call agent for /estimate.
# Read by functions/api/todays-agent.ts. Public read-only — no secret.
TODAYS_AGENT_URL = "https://script.google.com/macros/s/AKfycbyCBOgU6SyWUAgerb-_2iT9gOJmwgdR4-vRmahXMTIjgfchH7tzCJ1ufNLkVkovjwYnYQ/exec?api=todays-agent"
